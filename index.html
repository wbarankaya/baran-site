<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baran | Cyber Intelligence Panel</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
}

/* MATRIX */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* LOGIN */
.login {
    text-align: center;
    margin-top: 150px;
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    background: black;
    border: 1px solid #00ff9f;
    color: #00ff9f;
}

button {
    background: #00ff9f;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
}

/* PANEL */
.panel {
    display: none;
    padding: 20px;
}

.card {
    border: 1px solid #00ff9f;
    margin: 10px;
    padding: 10px;
}

/* TERMINAL */
.terminal {
    background: #020617;
    padding: 10px;
    height: 200px;
    overflow: auto;
}

/* GRAPH */
.bar {
    height: 20px;
    background: #00ff9f;
    margin: 5px 0;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <h1>> Secure Access</h1>
    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">
    <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div class="panel" id="panel">

    <h1>> Cyber Dashboard</h1>

    <div class="card terminal" id="terminal"></div>

    <div class="card">
        <h3>Port Risk Analysis</h3>
        <div class="bar" style="width:90%">Port 80</div>
        <div class="bar" style="width:70%">Port 443</div>
        <div class="bar" style="width:50%">Port 22</div>
    </div>

    <button onclick="report()">View Report</button>
    <button onclick="logout()">Logout</button>

</div>

<!-- REPORT -->
<div class="panel" id="reportPanel">

    <h1>> Pentest Report</h1>

    <div class="card">✔ XSS vulnerability found</div>
    <div class="card">✔ IDOR vulnerability found</div>
    <div class="card">✔ Weak TLS detected</div>

    <button onclick="back()">Back</button>

</div>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.95)
            drops[i] = 0;

        drops[i]++;
    }
}
setInterval(draw, 33);

/* LOGIN */
function login() {
    if (user.value === "admin" && pass.value === "1234") {
        loginBox.style.display = "none";
        panel.style.display = "block";
        startScan();
    } else {
        alert("Access Denied");
    }
}

/* NMAP SIMULATION */
function startScan() {
    let output = [
        "Starting Nmap 7.95...",
        "Scanning target 192.168.1.1",
        "PORT   STATE SERVICE",
        "22/tcp open  ssh",
        "80/tcp open  http",
        "443/tcp open https",
        "Vulnerability: XSS detected",
        "Vulnerability: IDOR detected",
        "Scan complete."
    ];

    let i = 0;
    let term = document.getElementById("terminal");

    let interval = setInterval(() => {
        term.innerHTML += output[i] + "<br>";
        term.scrollTop = term.scrollHeight;
        i++;
        if (i >= output.length) clearInterval(interval);
    }, 500);
}

/* REPORT */
function report() {
    panel.style.display = "none";
    reportPanel.style.display = "block";
}

function back() {
    reportPanel.style.display = "none";
    panel.style.display = "block";
}

function logout() {
    panel.style.display = "none";
    loginBox.style.display = "block";
}
</script>

</body>
</html>
